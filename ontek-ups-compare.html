<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONTEK — Подбор и сравнение</title>
<style>
:root {
  --bg: #0f1219; --bg-card: #171b26; --bg-elevated: #1e2333;
  --border: #2a3040; --text: #e1e4ea; --text-secondary: #9299a8;
  --accent: #3b82f6; --accent-hover: #2563eb; --accent-muted: rgba(59,130,246,0.12);
  --green: #10b981; --green-bg: rgba(16,185,129,0.12);
  --red: #ef4444; --red-bg: rgba(239,68,68,0.12);
  --amber: #f59e0b; --amber-bg: rgba(245,158,11,0.12);
  --radius: 10px; --radius-sm: 6px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.container{max-width:1600px;margin:0 auto;padding:20px}
.header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.header-logo{font-size:22px;font-weight:700;letter-spacing:3px;color:#fff}
.header-sub{color:var(--text-secondary);font-size:13px}
.tab-bar{display:flex;gap:4px;margin-left:auto;background:var(--bg-elevated);padding:3px;border-radius:var(--radius-sm)}
.tab-btn{background:transparent;border:none;color:var(--text-secondary);padding:6px 18px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{background:var(--accent);color:#fff}
.stats-bar{display:flex;gap:20px;flex-wrap:wrap;margin:16px 0}
.stat{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;font-size:13px}
.stat span{color:var(--accent);font-weight:600;font-size:18px}
.filters-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.filter-section{margin-bottom:14px}
.filter-section:last-child{margin-bottom:0}
.filter-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-bottom:6px;font-weight:600}
.filter-row{display:flex;flex-wrap:wrap;gap:6px}
.filter-btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-secondary);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.reset-btn{background:transparent;border:1px dashed var(--border);color:var(--text-secondary);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px}
.reset-btn:hover{border-color:var(--red);color:var(--red)}
.section-title{font-size:18px;font-weight:700;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.section-count{font-size:12px;color:var(--text-secondary);font-weight:400;background:var(--bg-elevated);padding:2px 10px;border-radius:12px}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:8px}
.product-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .15s;position:relative}
.product-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.product-card.selected{border-color:var(--accent);background:var(--accent-muted)}
.product-card.selected::after{content:"\2713";position:absolute;top:10px;right:14px;width:24px;height:24px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700}
.product-series{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:600;margin-bottom:4px}
.product-name{font-size:16px;font-weight:700;margin-bottom:8px}
.product-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bg-elevated);color:var(--text-secondary)}
.tag.power{background:var(--green-bg);color:var(--green)}
.tag.battery{background:var(--amber-bg);color:var(--amber)}
.tag.pf{background:var(--accent-muted);color:var(--accent)}
.tag.type{background:rgba(99,102,241,0.12);color:#a5b4fc}
.hidden-card{display:none}
.no-results{text-align:center;padding:40px;color:var(--text-secondary);font-size:14px;grid-column:1/-1}
.compare-bar{position:sticky;bottom:0;background:var(--bg-card);border-top:2px solid var(--accent);padding:14px 20px;display:flex;align-items:center;gap:12px;z-index:100;flex-wrap:wrap}
.compare-bar-label{font-size:13px;color:var(--text-secondary);white-space:nowrap}
.compare-chips{display:flex;gap:8px;flex-wrap:wrap;flex:1;align-items:center}
.compare-chip{background:var(--accent-muted);border:1px solid var(--accent);color:var(--accent);padding:4px 10px;border-radius:16px;font-size:12px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.compare-chip-remove{cursor:pointer;font-size:16px;line-height:1;opacity:.7}
.compare-chip-remove:hover{opacity:1;color:var(--red)}
.compare-actions{display:flex;gap:8px;margin-left:auto}
.btn{padding:10px 22px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--bg-elevated);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--text-secondary)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-danger:hover{background:var(--red-bg)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-diff{background:transparent;color:var(--amber);border:2px solid var(--amber);padding:6px 18px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:700;transition:all .15s;white-space:nowrap}
.btn-diff:hover{background:var(--amber-bg)}
.btn-diff.active{background:var(--amber);color:#000;box-shadow:0 0 12px var(--amber)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;padding:20px}
.modal-overlay.open{display:block}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);max-width:100%;margin:0 auto;display:flex;flex-direction:column;max-height:calc(100vh - 40px)}
.modal-header{background:var(--bg-card);padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius) var(--radius) 0 0;gap:12px}
.modal-title{font-size:18px;font-weight:700;white-space:nowrap}
.modal-close{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-close:hover{background:var(--red-bg);border-color:var(--red)}
.spec-toggles{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0}
.spec-toggle{font-size:12px;padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:var(--bg-elevated);color:var(--text-secondary);cursor:pointer;transition:all .15s;white-space:nowrap}
.spec-toggle.active{background:var(--accent-muted);border-color:var(--accent);color:var(--accent)}
.spec-toggle:hover{border-color:var(--text-secondary)}
.table-wrap{overflow:auto;flex:1;padding:0 24px 24px}
.compare-table{width:100%;border-collapse:collapse;font-size:12px;min-width:800px}
.compare-table th,.compare-table td{padding:8px 12px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
.compare-table th{background:var(--bg-elevated);font-weight:600;position:sticky;top:0;z-index:5;white-space:nowrap}
.compare-table th:first-child{text-align:left;min-width:200px;position:sticky;left:0;z-index:7;background:var(--bg-elevated)}
.compare-table td:first-child{text-align:left;font-weight:500;background:var(--bg-card);position:sticky;left:0;z-index:3;color:var(--text-secondary);white-space:nowrap}
.compare-table tr.spec-group-header td{background:var(--bg-elevated);color:var(--accent);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;padding:10px 12px;text-align:left}
.compare-table tr.spec-group-header td:first-child{background:var(--bg-elevated)}
.compare-table tr:hover td{background:rgba(255,255,255,.02)}
.compare-table tr.spec-group-header:hover td{background:var(--bg-elevated)}
.remove-model-btn{display:block;margin:0 auto 2px;background:transparent;border:1px solid transparent;color:var(--text-secondary);cursor:pointer;font-size:16px;padding:0 4px;border-radius:4px}
.remove-model-btn:hover{color:var(--red);border-color:var(--red)}
.data-source{font-size:10px;color:var(--text-secondary);font-style:italic;display:block;text-align:center}
::-webkit-scrollbar{height:6px;width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.dis-wrap{overflow:auto;max-height:70vh;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:12px}
.dis-table{border-collapse:collapse;font-size:12px}
.dis-table th,.dis-table td{padding:5px 8px;border:1px solid var(--border);text-align:center;white-space:nowrap}
.dis-table th{background:var(--bg-elevated);font-weight:600;position:sticky;top:0;z-index:4}
.dis-table th:first-child{left:0;z-index:6}
.dis-table td:first-child{background:var(--bg-card);font-weight:500;position:sticky;left:0;z-index:3;text-align:right;color:var(--text-secondary)}
.dis-table td.kw-val{color:var(--accent)}
.dis-filter-active{background:var(--accent-muted)!important;border-color:var(--accent)!important;color:var(--accent)!important}
.dis-controls{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;align-items:center}
.dis-controls select,.dis-controls input{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:var(--radius-sm);font-size:13px;font-family:inherit}
.dis-controls select option{background:var(--bg-card);color:var(--text)}
.dis-controls label{font-size:13px;color:var(--text-secondary);white-space:nowrap}
@media(max-width:768px){.container{padding:10px}.product-grid{grid-template-columns:1fr}.compare-bar{flex-direction:column;align-items:flex-start}.compare-actions{margin-left:0}.tab-bar{margin-left:0;width:100%}.header{flex-direction:column;align-items:stretch}}
</style>
</head>
<body>
<header class="header">
  <div class="header-logo">ONTEK</div>
  <div style="display:flex;align-items:center;gap:16px;flex:1;flex-wrap:wrap">
    <div class="header-sub" id="headerSub">Подбор и сравнение ИБП — все технические характеристики</div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="ups">ИБП</button>
      <button class="tab-btn" data-tab="bat">Батарейные модули</button>
      <button class="tab-btn" data-tab="dis">Разрядные таблицы</button>
    </div>
  </div>
</header>
<main class="container">
<div class="stats-bar">
  <div class="stat">Всего моделей: <span id="statTotal">0</span></div>
  <div class="stat">Выбрано: <span id="statSelected">0</span></div>
  <div class="stat"><span id="statLabel2">Трехфазных:</span> <span id="statP1">0</span></div>
  <div class="stat"><span id="statLabel3">Однофазных:</span> <span id="statP2">0</span></div>
</div>
<div class="filters-wrap" id="filtersWrap">
  <div class="filter-section" id="filterCat">
    <div class="filter-label">Категория</div>
    <div class="filter-row" id="filterCatRow"></div>
  </div>
  <div class="filter-section" id="filterPower">
    <div class="filter-label" id="filterPowerLabel">Мощность (кВА)</div>
    <div class="filter-row" id="filterPowerRow"></div>
  </div>
  <div class="filter-section" id="filterOther">
    <div class="filter-label" id="filterOtherLabel">Дополнительно</div>
    <div class="filter-row" id="filterOtherRow"></div>
  </div>
  <div class="filter-section">
    <div class="filter-label">Серия</div>
    <div class="filter-row" id="seriesFilters"></div>
  </div>
  <div class="filter-section">
    <button class="reset-btn" id="resetFilters">Сбросить все фильтры</button>
  </div>
</div>
<div id="productGrid"></div>
<div id="disTabContent" style="display:none">
  <div class="dis-controls">
    <label>Серия:</label>
    <select id="disSeriesFilter"><option value="all">Все</option><option value="DBCL">DBCL</option><option value="DBCM">DBCM</option></select>
    <label>Модель:</label>
    <select id="disModelFilter"><option value="all">Все</option></select>
    <label>Мощность (кВт):</label>
    <select id="disPowerFilter"><option value="all">Все</option></select>
    <button class="btn btn-primary" id="disRefresh" style="padding:6px 14px;font-size:13px">Обновить</button>
  </div>
  <div class="dis-wrap" id="disTableWrap"><p style="color:var(--text-secondary);padding:20px;text-align:center">Выберите модель для отображения разрядной таблицы</p></div>
</div>
</main>
<div class="compare-bar" id="compareBar">
  <div class="compare-bar-label">Сравнение:</div>
  <div class="compare-chips" id="compareChips"></div>
  <div class="compare-actions">
    <button class="btn btn-danger" id="clearCompare" disabled>Очистить</button>
    <button class="btn btn-primary" id="openCompare" disabled>Сравнить (0)</button>
  </div>
</div>
<div class="modal-overlay" id="compareModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Сравнение</div>
      <button class="btn-diff" id="diffToggle">Только различия</button>
      <button class="modal-close" id="closeModal">&times;</button>
    </div>
    <div class="spec-toggles" id="specToggles"></div>
    <div class="table-wrap">
      <table class="compare-table" id="compareTable"></table>
    </div>
  </div>
</div>

<script>
// ===== HELPERS =====
function M(overrides) {
  const base = {b_Общие:{},b_Вход:{},b_Выход:{},b_Байпас:{},b_КПД:{},b_Батареи:{},b_Физические:{},b_Интерфейсы:{},b_Среда:{}};
  for (const [grp,vals] of Object.entries(overrides)) { if (!base[grp]) base[grp] = {}; Object.assign(base[grp], vals); }
  const d = {};
  for (const [g,v] of Object.entries(base)) { if (Object.keys(v).length > 0) d[g] = v; }
  return d;
}

const UPS_SG_ORDER = ["b_Общие","b_Вход","b_Выход","b_Байпас","b_КПД","b_Батареи","b_Физические","b_Интерфейсы","b_Среда"];
const UPS_SG_LABELS = {b_Общие:"Общие параметры",b_Вход:"Входные характеристики",b_Выход:"Выходные характеристики",b_Байпас:"Байпас",b_КПД:"КПД",b_Батареи:"Батареи и ЗУ",b_Физические:"Физические параметры",b_Интерфейсы:"Интерфейсы",b_Среда:"Окр. среда и гарантия"};
const BAT_SG_ORDER = ["g_Общие","g_Электрические","g_Батарейный_массив","g_Защита","g_Физические","g_Среда"];
const BAT_SG_LABELS = {g_Общие:"Общие параметры",g_Электрические:"Электрические характеристики",g_Батарейный_массив:"Батарейный массив",g_Защита:"Защита",g_Физические:"Физические параметры",g_Среда:"Окр. среда и гарантия"};

// PM BASE SPECS
const PM_BASE_INPUT_10_20 = {"Ном. напряжение":"1x220/230/240 В или 3x380/400/415 В","Диапазон напряжений":"110-300 В (50% нагр.) / 176-276 В (100% нагр.)","Диапазон частот":"46-54 Гц или 56-64 Гц","THDi":"<4% (100% лин.)","Коэфф. мощности":">=0,99"};
const PM_BASE_INPUT_30_80 = {"Ном. напряжение":"3x380/400/415 В","Диапазон напряжений":"110-300 В (50%) / 176-276 В (100%)","Диапазон частот":"40-70 Гц","THDi":"<4% (100% лин.)","Коэфф. мощности":">=0,99"};
const PM_BASE_OUTPUT_MULTI = {"Выходное напряжение":"1x220/230/240 В или 3x380/400/415 В","Стабилизация":"+-1%","Частота (сеть)":"46-54 Гц или 56-64 Гц","Частота (бат.)":"50/60 Гц +-0,1 Гц","Крест-фактор":"3:1","THD":"<=2% (лин.); <=5% (нелин.)","Переход на бат/байпас":"0 мс","Перегрузка":"100-110% 60 мин, 111-125% 10 мин, 126-150% 1 мин, >150% немедл."};
const PM_BASE_OUTPUT_3PH = {"Выходное напряжение":"3x380/400/415 В","Стабилизация":"+-1%","Частота (сеть)":"46-54 Гц или 56-64 Гц","Частота (бат.)":"50/60 Гц +-0,1 Гц","Крест-фактор":"3:1","THD":"<=2% (лин.); <=5% (нелин.)","Переход на бат/байпас":"0 мс","Перегрузка":"100-110% 60 мин, 111-125% 10 мин, 126-150% 1 мин, >150% немедл."};
const PM_BASE_BYPASS_MULTI = {"Ном. напряжение":"1x220/230/240 В или 3x380/400/415 В","Диапазон напряжения":"-30% +20% (регулируемый)","Частота":"46-54 Гц или 56-64 Гц"};
const PM_BASE_BYPASS_3PH = {"Ном. напряжение":"3x380/400/415 В","Диапазон напряжения":"305-457 В","Частота":"46-54 Гц или 56-64 Гц"};
const PM_BASE_INTERFACES = {"Дисплей":"Сенсорный цветной ЖК 5''","Порты":"RS-232, USB, Modbus (RS485x2)","Сухие контакты":"6 вх. + 4 вых. реле","Датчик температуры":"В комплекте","Опционально":"SNMP, датчик окр. среды"};
const PM_BASE_ENV = {"Температура":"0-40C","Влажность":"<95% без конденсата","Высота":"0-1500 м (100% нагр.)","Сертификация":"ЕАЭС ТР ТС 004/2011, ТР ТС 020/2011, ISO 9001","Гарантия":"3 года (до 5 лет)"};
function PM_BAT_EXT(cnt, amps) { return {"Тип":"Зависит от задачи (внешние)","Количество":cnt,"Зарядный ток":"1-"+amps+" А","Напряжение заряда":"+-13,65VxN","Метод заряда":"Трехступенчатый","Термокомпенсация":"В наличии","Холодный старт":"В наличии"}; }
function PM_BAT_INT(cnt, years) { return {"Тип":"12V / 9Ah (внутренние)","Количество":cnt,"Срок службы":years||"5 лет (10 лет опционально)","Время заряда":"4 ч до 90%","Внешние АКБ":"Можно подключить","Метод заряда":"Трехступенчатый","Термокомпенсация":"В наличии","Холодный старт":"В наличии"}; }

// ===== UPS DATA =====

  for (const [grp,vals] of Object.entries(overrides)) { if (!base[grp]) base[grp] = {}; Object.assign(base[grp], vals); }
  const d = {};
  for (const [g,v] of Object.entries(base)) { if (Object.keys(v).length > 0) d[g] = v; }
  return d;
}

function cabBat(id, series, name, en, pwr, protCur, dims, weight) {
  return {
    id, series, cat:"cabinet", name, en:parseFloat(en), pwr:parseFloat(pwr),
    specs: bat({
      g_Общие: {"Тип модуля":name,"Исполнение":series,"Энергоотдача":en+" кВт (10 мин)","Номинальное напряжение":"480 В"},

}

function render() {
  let f = getF();
  let g = {};
  for (let m of f) { if (!g[m.series]) g[m.series]=[]; g[m.series].push(m); }
  let so = Object.keys(g).sort((a,b) => g[a][0].pwr - g[b][0].pwr);
  let h = '';
  for (let s of so) {
    let items = g[s];
    h += '<div class="section-title">' + s + ' <span class="section-count">' + items.length + ' моделей</span></div><div class="product-grid">';
    for (let u of items) h += card(u);
    h += '</div>';
  }
  if (!f.length) h = '<div class="no-results">Нет моделей. Измените фильтры.</div>';
  document.getElementById('productGrid').innerHTML = h;
  document.querySelectorAll('.product-card').forEach(c => c.addEventListener('click', function() { toggle(this.dataset.id); }));
  updStats();
}

function card(m) {
  let sel = selected.has(m.id);
  if (activeTab === 'ups') {
    return '<div class="product-card' + (sel?' selected':"") + '" data-id="' + m.id + '">' +
      '<div class="product-series">' + m.series + '</div>' +
      '<div class="product-name">' + m.name + '</div>' +
      '<div class="product-tags">' +
      '<span class="tag power">' + m.pwr + ' кВА / ' + m.kw + ' кВт</span>' +
      '<span class="tag pf">PF=' + m.pf + '</span>' +
      '<span class="tag battery">' + m.batLbl + '</span></div></div>';
  } else {
    return '<div class="product-card' + (sel?' selected':"") + '" data-id="' + m.id + '">' +
      '<div class="product-series">' + m.series + '</div>' +
      '<div class="product-name">' + m.name + '</div>' +
      '<div class="product-tags">' +
      '<span class="tag power">' + m.en + ' кВт·ч</span>' +
      '<span class="tag pf">' + m.pwr + ' кВт</span>' +
      '<span class="tag type">' + m.cat + '</span></div></div>';
  }
}

function updStats() {
  let f = getF();
  document.getElementById('statTotal').textContent = f.length;
  document.getElementById('statSelected').textContent = selected.size;
  if (activeTab === 'ups') {
    document.getElementById('statLabel2').textContent = 'Трехфазных:';
    document.getElementById('statLabel3').textContent = 'Однофазных:';
    document.getElementById('statP1').textContent = f.filter(m => m.cat==='three-phase').length;
    document.getElementById('statP2').textContent = f.filter(m => m.cat==='single-phase').length;
  } else {
    document.getElementById('statLabel2').textContent = 'Напольных:';
    document.getElementById('statLabel3').textContent = 'Стоечных/RT:';
    document.getElementById('statP1').textContent = f.filter(m => m.cat==='cabinet'||m.cat==='lifepo4').length;
    document.getElementById('statP2').textContent = f.filter(m => m.cat==='rt'||m.cat==='rack').length;
  }
}

function parsePower(p) {
  var m = p.match(/^(\d+)(?:x(\d+))?/);
  if (!m) return 0;
  return parseInt(m[1]) * (m[2] ? parseInt(m[2]) : 1);
}
function renderDis() {
  let selSeries = document.getElementById('disSeriesFilter').value;
  let selModel = document.getElementById('disModelFilter').value;
  let selPower = document.getElementById('disPowerFilter').value;

  // Filter models by series/model
  let filtered = [];
  for (let i = 0; i < DISCHARGE_TABLE.models.length; i++) {
    let m = DISCHARGE_TABLE.models[i];
    if (selSeries !== 'all' && m.series !== selSeries) continue;
    if (selModel !== 'all' && m.model !== selModel) continue;
    filtered.push({idx: i, series: m.series, model: m.model, id: m.id});
  }

  let wrap = document.getElementById('disTableWrap');
  if (!filtered.length) {
    wrap.innerHTML = '<p style="color:var(--text-secondary);padding:20px;text-align:center">Нет данных. Измените фильтры.</p>';
    return;
  }

  let rows = DISCHARGE_TABLE.rows;
  var loads = Object.keys(rows).map(Number).sort(function(a,b){return a-b;});

  // Filter loads if specific power selected
  if (selPower !== 'all') {
    loads = loads.filter(function(l) { return l === Number(selPower); });
  }

  var h = '<table class="dis-table"><thead><tr><th>Нагрузка (кВт)</th>';
  for (var i = 0; i < filtered.length; i++) {
    h += '<th>' + filtered[i].model + '</th>';
  }
  h += '</tr></thead><tbody>';
  for (var li = 0; li < loads.length; li++) {
    var load = loads[li];
    var vals = rows[load];
    h += '<tr><td>' + load + '</td>';
    for (var mi = 0; mi < filtered.length; mi++) {
      var v = vals[filtered[mi].idx];
      if (v !== null && v !== undefined) {
        h += '<td class="kw-val">' + v + '</td>';
      } else {
        h += '<td style="color:var(--text-secondary)">—</td>';
      }
    }
    h += '</tr>';
  }
  h += '</tbody></table>';
  wrap.innerHTML = h;
}

function renderSer() {
  let data = getData();
  let all = [...new Set(data.map(m => m.series))].sort();
  let h = all.map(s => '<button class="filter-btn' + (filters.ser.includes(s)?' active':"") + '" data-filter="ser" data-val="' + s + '">' + s + '</button>').join('');
  document.getElementById('seriesFilters').innerHTML = h;
}

// ===== RENDER FILTERS =====
function renderFilters() {
  if (activeTab === 'ups') {
    document.getElementById('filterCatRow').innerHTML =
      '<button class="filter-btn active" data-filter="category" data-val="all">Все</button>' +
      '<button class="filter-btn" data-filter="category" data-val="three-phase">Трехфазные</button>' +
      '<button class="filter-btn" data-filter="category" data-val="single-phase">Однофазные</button>';
    document.getElementById('filterPowerLabel').textContent = 'Мощность (кВА)';
    document.getElementById('filterPowerRow').innerHTML =
      '<button class="filter-btn" data-filter="power" data-val="0-3">до 3</button>' +
      '<button class="filter-btn" data-filter="power" data-val="3-10">3-10</button>' +
      '<button class="filter-btn" data-filter="power" data-val="10-30">10-30</button>' +
      '<button class="filter-btn" data-filter="power" data-val="30-80">30-80</button>' +
      '<button class="filter-btn" data-filter="power" data-val="80-200">80-200</button>' +
      '<button class="filter-btn" data-filter="power" data-val="200+">>200</button>';
    document.getElementById('filterOtherLabel').textContent = 'Тип батарей';
    document.getElementById('filterOtherRow').innerHTML =
      '<button class="filter-btn" data-filter="battery" data-val="external">Внешние</button>' +
      '<button class="filter-btn" data-filter="battery" data-val="internal">Внутренние</button>';
  } else {
    document.getElementById('filterCatRow').innerHTML =
      '<button class="filter-btn active" data-filter="category" data-val="all">Все</button>' +
      '<button class="filter-btn" data-filter="category" data-val="cabinet">Напольные</button>' +
      '<button class="filter-btn" data-filter="category" data-val="lifepo4">LiFePO4</button>' +
      '<button class="filter-btn" data-filter="category" data-val="rt">RT модули</button>' +
      '<button class="filter-btn" data-filter="category" data-val="rack">Стоечные/Стеллажи</button>';
    document.getElementById('filterPowerLabel').textContent = 'Энергоотдача (кВт·ч)';
    document.getElementById('filterPowerRow').innerHTML =
      '<button class="filter-btn" data-filter="power" data-val="0-2">до 2</button>' +
      '<button class="filter-btn" data-filter="power" data-val="2-5">2-5</button>' +
      '<button class="filter-btn" data-filter="power" data-val="5-10">5-10</button>' +
      '<button class="filter-btn" data-filter="power" data-val="10-20">10-20</button>' +
      '<button class="filter-btn" data-filter="power" data-val="20+">>20</button>';
    document.getElementById('filterOtherRow').innerHTML = '';
    document.getElementById('filterOtherLabel').textContent = '';
  }
  // Restore active filters
  document.querySelectorAll('.filter-btn[data-filter="category"]').forEach(b => {
    if (b.dataset.val === filters.cat) b.classList.add('active');
  });
  if (activeTab === 'ups') {
    document.querySelectorAll('.filter-btn[data-filter="battery"]').forEach(b => {
      if (filters.bat.includes(b.dataset.val)) b.classList.add('active');
    });
  }
  document.querySelectorAll('.filter-btn[data-filter="power"]').forEach(b => {
    if (filters.pwr.includes(b.dataset.val)) b.classList.add('active');
  });
}

// ===== CHIPS =====
function renderChips() {
  let data = getData();
  let c = document.getElementById('compareChips');
  let cl = document.getElementById('clearCompare');
  let op = document.getElementById('openCompare');
  if (!selected.size) {
    c.innerHTML = '<span style="color:var(--text-secondary);font-size:13px;">Выберите модели из списка</span>';
    cl.disabled = true; op.disabled = true; op.textContent = 'Сравнить (0)';
    return;
  }
  cl.disabled = false; op.disabled = false; op.textContent = 'Сравнить (' + selected.size + ')';
  let h = '';
  for (let id of selected) {
    let m = data.find(x => x.id === id);
    if (!m) continue;
    h += '<div class="compare-chip">' + m.name + '<span class="compare-chip-remove" data-id="' + id + '">&times;</span></div>';
  }
  c.innerHTML = h;
  c.querySelectorAll('.compare-chip-remove').forEach(b => b.addEventListener('click', function(e) { e.stopPropagation(); toggle(this.dataset.id); }));
}

function toggle(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  render(); renderChips();
}

// ===== MODAL =====
function openM() {
  if (selected.size < 2) return;
  showDiff = false;
  document.getElementById('diffToggle').classList.remove('active');
  let title = activeTab === 'ups' ? 'Сравнение ИБП' : 'Сравнение батарейных модулей';
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('compareModal').classList.add('open');
  renderToggles(); renderTbl();
}

function closeM() { document.getElementById('compareModal').classList.remove('open'); }

function renderToggles() {
  let order = getSGOrder();
  let labels = getSGLabels();
  let groups = getSG();
  let c = document.getElementById('specToggles');
  let h = '';
  for (let g of order) h += '<button class="spec-toggle' + (groups.has(g)?' active':"") + '" data-grp="' + g + '">' + labels[g] + '</button>';
  c.innerHTML = h;
  c.querySelectorAll('.spec-toggle').forEach(b => b.addEventListener('click', function() {
    let g = this.dataset.grp;
    let groups = getSG();
    if (groups.has(g)) { if (groups.size > 1) groups.delete(g); } else groups.add(g);
    renderToggles(); renderTbl();
  }));
}

function renderTbl() {
  let data = getData();
  let ids = [...selected];
  let ms = ids.map(id => data.find(m => m.id === id)).filter(Boolean);
  let order = getSGOrder();
  let labels = getSGLabels();
  let groups = getSG();
  let rows = [];
  let seen = new Set();
  for (let g of order) {
    if (!groups.has(g)) continue;
    let keys = [];
    for (let m of ms) if (m.specs[g]) for (let k of Object.keys(m.specs[g])) if (!seen.has(g+'|'+k)) { seen.add(g+'|'+k); keys.push(k); }
    for (let k of keys) rows.push({g, k});
  }
  if (showDiff && ms.length > 1) {
    rows = rows.filter(r => {
      let vals = ms.map(m => (m.specs[r.g] && m.specs[r.g][r.k]) || '-');
      return new Set(vals).size > 1;
    });
  }
  let curG = null;
  let h = '<thead><tr><th>Характеристика</th>';
  for (let m of ms) h += '<th><button class="remove-model-btn" data-id="' + m.id + '" title="Убрать">&times;</button>' + m.name + '<br><small style="color:var(--text-secondary);font-weight:400;">' + m.series + '</small></th>';
  h += '</tr></thead><tbody>';
  for (let r of rows) {
    if (r.g !== curG) { curG = r.g; h += '<tr class="spec-group-header"><td colspan="' + (ms.length+1) + '">' + (labels[r.g]||r.g) + '</td></tr>'; }
    h += '<tr><td>' + r.k + '</td>';
    for (let m of ms) h += '<td>' + ((m.specs[r.g] && m.specs[r.g][r.k]) || '-') + '</td>';
    h += '</tr>';
  }
  h += '</tbody>';
  document.getElementById('compareTable').innerHTML = h;
  document.querySelectorAll('.remove-model-btn').forEach(b => b.addEventListener('click', function(e) {
    e.stopPropagation();
    selected.delete(this.dataset.id);
    renderChips(); render();
    if (selected.size >= 2) { renderTbl(); renderToggles(); } else closeM();
  }));
}

// ===== TAB SWITCH =====
function switchTab(tab) {
  activeTab = tab;
  selected.clear();
  showDiff = false;
  filters = {cat:'all',pwr:[],bat:[],ser:[]};
  upsSpecGroups = new Set(UPS_SG_ORDER);
  batSpecGroups = new Set(BAT_SG_ORDER);
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('headerSub').textContent = tab === 'ups' ? 'Подбор и сравнение ИБП — все технические характеристики' : tab === 'bat' ? 'Подбор и сравнение батарейных модулей' : 'Разрядные таблицы — батарейные шкафы DBCL/DBCM';
  document.getElementById('filtersWrap').style.display = tab === 'dis' ? 'none' : '';
  document.getElementById('productGrid').style.display = tab === 'dis' ? 'none' : '';
  document.getElementById('disTabContent').style.display = tab === 'dis' ? '' : 'none';
  if (tab === 'dis') {
    populateDisFilters();
    renderDis();
  } else {
    renderFilters();
    renderSer();
    render();
    renderChips();
    updStats();
  }
}

// ===== EVENT HANDLERS =====
document.querySelector('.tab-bar').addEventListener('click', function(e) {
  let btn = e.target.closest('.tab-btn');
  if (btn && btn.dataset.tab !== activeTab) switchTab(btn.dataset.tab);
});

document.getElementById('filtersWrap').addEventListener('click', function(e) {
  let b = e.target.closest('.filter-btn');
  if (!b) return;
  let f = b.dataset.filter, v = b.dataset.val;
  if (f === 'category') {
    document.querySelectorAll('.filter-btn[data-filter="category"]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filters.cat = v;
  } else if (f === 'power') {
    b.classList.toggle('active');
    let i = filters.pwr.indexOf(v);
    i >= 0 ? filters.pwr.splice(i,1) : filters.pwr.push(v);
  } else if (f === 'battery') {
    b.classList.toggle('active');
    let i = filters.bat.indexOf(v);
    i >= 0 ? filters.bat.splice(i,1) : filters.bat.push(v);
  } else if (f === 'ser') {
    b.classList.toggle('active');
    let i = filters.ser.indexOf(v);
    i >= 0 ? filters.ser.splice(i,1) : filters.ser.push(v);
  }
  render(); renderSer(); updStats();
});

document.getElementById('resetFilters').addEventListener('click', function() {
  filters = {cat:'all',pwr:[],bat:[],ser:[]};
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-filter="category"][data-val="all"]').classList.add('active');
  render(); renderSer(); updStats();
});

document.getElementById('clearCompare').addEventListener('click', function() { selected.clear(); render(); renderChips(); });
document.getElementById('openCompare').addEventListener('click', openM);
document.getElementById('closeModal').addEventListener('click', closeM);
document.getElementById('compareModal').addEventListener('click', function(e) { if (e.target === this) closeM(); });
document.getElementById('diffToggle').addEventListener('click', function() {
  showDiff = !showDiff;
  this.classList.toggle('active');
  renderTbl();
});
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeM(); });

// ===== DISCHARGE TAB EVENTS =====
function populateDisFilters() {
  var seriesEl = document.getElementById('disSeriesFilter');
  var model = document.getElementById('disModelFilter');
  var power = document.getElementById('disPowerFilter');

  // Populate model dropdown
  var selSeries = seriesEl.value;
  var models = DISCHARGE_TABLE.models.filter(function(m) { return selSeries === 'all' || m.series === selSeries; });
  var modelNames = models.map(function(m) { return m.model; }).sort();
  model.innerHTML = '<option value="all">Все</option>' + modelNames.map(function(n) { return '<option value="' + n + '">' + n + '</option>'; }).join('');

  // Populate power (load) dropdown from DISCHARGE_TABLE rows
  var loads = Object.keys(DISCHARGE_TABLE.rows).map(Number).sort(function(a,b){return a-b;});
  power.innerHTML = '<option value="all">Все</option>' + loads.map(function(l) { return '<option value="' + l + '">' + l + ' кВт</option>'; }).join('');
}

document.getElementById('disSeriesFilter').addEventListener('change', function() {
  populateDisFilters();
  renderDis();
});

document.getElementById('disModelFilter').addEventListener('change', renderDis);
document.getElementById('disPowerFilter').addEventListener('change', renderDis);
document.getElementById('disRefresh').addEventListener('click', renderDis);

// ===== INIT =====
switchTab('ups');
</script>
</body>
</html>
